<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Expression to Image Renderer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .control-item {
            display: flex;
            flex-direction: column;
        }
        
        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-render {
            background: #667eea;
            color: white;
        }
        
        .btn-render:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-download {
            background: #10b981;
            color: white;
        }
        
        .btn-download:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
        }
        
        .btn-view {
            background: #3b82f6;
            color: white;
        }
        
        .btn-view:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }
        
        .btn-copy {
            background: #f59e0b;
            color: white;
        }
        
        .btn-copy:hover {
            background: #d97706;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
        }
        
        .examples {
            margin-bottom: 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .example-btn {
            padding: 8px 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
        }
        
        .example-btn:hover {
            background: #e5e7eb;
            color: #333;
        }
        
        .canvas-container {
            background: #f9fafb;
            border: 2px dashed #e5e7eb;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }
        
        canvas {
            background: white;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .status-message {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .status-message.show {
            display: block;
        }
        
        .status-message.success {
            background: #d1fae5;
            color: #065f46;
            border-left: 4px solid #10b981;
        }
        
        .status-message.error {
            background: #fee2e2;
            color: #7f1d1d;
            border-left: 4px solid #ef4444;
        }
        
        .status-message.info {
            background: #dbeafe;
            color: #1e3a8a;
            border-left: 4px solid #3b82f6;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .info-box {
            background: #eff6ff;
            border-left: 4px solid #3b82f6;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 13px;
            color: #1e40af;
            margin-bottom: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .controls {
                grid-template-columns: 1fr;
            }
            
            .button-group {
                grid-template-columns: 1fr;
            }
            
            h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧮 Math Expression to Image</h1>
        <p class="subtitle">Convert mathematical expressions to beautiful rendered images</p>
        
        <div class="status-message" id="statusMessage"></div>
        
        <div class="info-box">
            💡 Enter a math expression below and render it as an image. Download as PNG or view online.
        </div>
        
        <div class="input-group">
            <label for="expressionInput">Mathematical Expression:</label>
            <input 
                type="text" 
                id="expressionInput" 
                placeholder="e.g., x^2 + 2*x + 1" 
                value="x^2 + 2*x + 1"
            >
        </div>
        
        <div class="examples">
            <strong style="align-self: center; margin-right: 10px; color: #666;">Examples:</strong>
            <button class="example-btn" onclick="setExample('2 + 3 * 4')">2 + 3 * 4</button>
            <button class="example-btn" onclick="setExample('(5 + 3) / 2')"> (5 + 3) / 2</button>
            <button class="example-btn" onclick="setExample('sqrt(16) + 3')">sqrt(16) + 3</button>
            <button class="example-btn" onclick="setExample('sin(π/2) + cos(0)')">sin(π/2)</button>
            <button class="example-btn" onclick="setExample('(1 + sqrt(5)) / 2')">(1 + sqrt(5)) / 2</button>
            <button class="example-btn" onclick="setExample('e^(i*π) + 1')">e^(i*π) + 1</button>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <label for="fontSize">Font Size:</label>
                <select id="fontSize" onchange="updateRenderer()">
                    <option value="16">Small (16px)</option>
                    <option value="24" selected>Medium (24px)</option>
                    <option value="32">Large (32px)</option>
                    <option value="40">Extra Large (40px)</option>
                </select>
            </div>
            <div class="control-item">
                <label for="fontFamily">Font:</label>
                <select id="fontFamily" onchange="updateRenderer()">
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Georgia, serif">Georgia</option>
                    <option value="Courier New, monospace">Courier New</option>
                    <option value="Times New Roman, serif">Times New Roman</option>
                </select>
            </div>
        </div>
        
        <div class="button-group">
            <button class="btn-render" onclick="renderExpression()">🎨 Render</button>
            <button class="btn-download" onclick="downloadImage()">⬇️ Download PNG</button>
            <button class="btn-view" onclick="viewImage()">👁️ View Image</button>
            <button class="btn-copy" onclick="copyToClipboard()">📋 Copy</button>
        </div>
        
        <div class="canvas-container">
            <canvas id="mathCanvas" width="600" height="200"></canvas>
        </div>
    </div>
    
    <script>
        let currentCanvas = null;
        let renderer = null;
        
        class MathExpressionRenderer {
            constructor(canvas, options = {}) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.fontSize = options.fontSize || 24;
                this.fontFamily = options.fontFamily || 'Arial, sans-serif';
                this.padding = 20;
            }
            
            renderExpression(expression) {
                try {
                    const tokens = this.tokenize(expression);
                    const ast = this.parse(tokens);
                    this.canvas.width = 800;
                    this.canvas.height = 300;
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    this.ctx.fillStyle = '#000';
                    this.ctx.font = `${this.fontSize}px ${this.fontFamily}`;
                    
                    const measurement = this.measureExpression(ast);
                    const x = (this.canvas.width - measurement.width) / 2;
                    const y = (this.canvas.height + measurement.height) / 2;
                    
                    this.drawExpression(ast, x, y);
                    return true;
                } catch (e) {
                    console.error('Render error:', e);
                    return false;
                }
            }
            
            tokenize(expr) {
                const tokens = [];
                let i = 0;
                while (i < expr.length) {
                    if (/\s/.test(expr[i])) {
                        i++;
                    } else if (/[+\-*/^()√]/.test(expr[i])) {
                        tokens.push(expr[i]);
                        i++;
                    } else if (/[0-9a-zA-Z]/.test(expr[i])) {
                        let num = '';
                        while (i < expr.length && /[0-9a-zA-Z._]/.test(expr[i])) {
                            num += expr[i];
                            i++;
                        }
                        tokens.push(num);
                    } else {
                        i++;
                    }
                }
                return tokens;
            }
            
            parse(tokens, pos = 0) {
                return this.parseExpression(tokens, pos)[0];
            }
            
            parseExpression(tokens, pos) {
                let left = this.parseTerm(tokens, pos);
                pos = left[1];
                
                while (pos < tokens.length && (tokens[pos] === '+' || tokens[pos] === '-')) {
                    const op = tokens[pos++];
                    const right = this.parseTerm(tokens, pos);
                    pos = right[1];
                    left = [{ type: 'binop', op, left: left, right: right[0] }];
                }
                
                return [left, pos];
            }
            
            parseTerm(tokens, pos) {
                let left = this.parseFactor(tokens, pos);
                pos = left[1];
                
                while (pos < tokens.length && (tokens[pos] === '*' || tokens[pos] === '/')) {
                    const op = tokens[pos++];
                    const right = this.parseFactor(tokens, pos);
                    pos = right[1];
                    left = [{ type: 'binop', op, left: left, right: right[0] }];
                }
                
                return [left, pos];
            }
            
            parseFactor(tokens, pos) {
                let left = this.parsePower(tokens, pos);
                pos = left[1];
                
                return [left[0], pos];
            }
            
            parsePower(tokens, pos) {
                let left = this.parsePrimary(tokens, pos);
                pos = left[1];
                
                if (pos < tokens.length && tokens[pos] === '^') {
                    pos++;
                    const right = this.parsePower(tokens, pos);
                    pos = right[1];
                    left = [{ type: 'binop', op: '^', left: left[0], right: right[0] }];
                }
                
                return [left[0], pos];
            }
            
            parsePrimary(tokens, pos) {
                if (tokens[pos] === '(') {
                    pos++;
                    const expr = this.parseExpression(tokens, pos);
                    pos = expr[1] + 1;
                    return [expr[0], pos];
                } else if (tokens[pos] === 'sqrt' || tokens[pos] === '√') {
                    pos++;
                    const arg = this.parsePrimary(tokens, pos);
                    return [{ type: 'sqrt', arg: arg[0] }, arg[1]];
                } else {
                    return [{ type: 'number', value: tokens[pos] }, pos + 1];
                }
            }
            
            measureExpression(ast) {
                this.ctx.font = `${this.fontSize}px ${this.fontFamily}`;
                
                if (ast.type === 'number') {
                    const m = this.ctx.measureText(ast.value);
                    return { width: m.width, height: this.fontSize };
                } else if (ast.type === 'binop') {
                    const left = this.measureExpression(ast.left);
                    const right = this.measureExpression(ast.right);
                    
                    if (ast.op === '/') {
                        return {
                            width: Math.max(left.width, right.width) + 10,
                            height: left.height + right.height + 20
                        };
                    } else {
                        return {
                            width: left.width + right.width + 20,
                            height: Math.max(left.height, right.height)
                        };
                    }
                } else if (ast.type === 'sqrt') {
                    const arg = this.measureExpression(ast.arg);
                    return { width: arg.width + 30, height: arg.height + 10 };
                }
                
                return { width: 50, height: this.fontSize };
            }
            
            drawExpression(ast, x, y) {
                if (ast.type === 'number') {
                    this.ctx.fillText(ast.value, x, y);
                } else if (ast.type === 'binop') {
                    if (ast.op === '/') {
                        const left = this.measureExpression(ast.left);
                        const right = this.measureExpression(ast.right);
                        const width = Math.max(left.width, right.width) + 10;
                        
                        this.drawExpression(ast.left, x + (width - left.width) / 2, y - 20);
                        this.ctx.strokeStyle = '#000';
                        this.ctx.lineWidth = 2;
                        this.ctx.beginPath();
                        this.ctx.moveTo(x, y);
                        this.ctx.lineTo(x + width, y);
                        this.ctx.stroke();
                        this.drawExpression(ast.right, x + (width - right.width) / 2, y + 20);
                    } else {
                        const left = this.measureExpression(ast.left);
                        this.drawExpression(ast.left, x, y);
                        const opText = ` ${ast.op} `;
                        this.ctx.fillText(opText, x + left.width, y);
                        this.drawExpression(ast.right, x + left.width + this.ctx.measureText(opText).width, y);
                    }
                } else if (ast.type === 'sqrt') {
                    const arg = this.measureExpression(ast.arg);
                    this.ctx.fillText('√', x, y);
                    this.drawExpression(ast.arg, x + 30, y);
                }
            }
            
            downloadImage(filename = 'image.png') {
                const link = document.createElement('a');
                link.href = this.canvas.toDataURL('image/png');
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
            
            getImageDataURL() {
                return this.canvas.toDataURL('image/png');
            }
        }
        
        function initRenderer() {
            const canvas = document.getElementById('mathCanvas');
            const fontSize = parseInt(document.getElementById('fontSize').value);
            const fontFamily = document.getElementById('fontFamily').value;
            
            renderer = new MathExpressionRenderer(canvas, {
                fontSize: fontSize,
                fontFamily: fontFamily
            });
            
            currentCanvas = canvas;
            renderExpression();
        }
        
        function renderExpression() {
            const expression = document.getElementById('expressionInput').value;
            
            if (!expression.trim()) {
                showStatus('Please enter a mathematical expression', 'error');
                return;
            }
            
            if (!renderer) initRenderer();
            
            const success = renderer.renderExpression(expression);
            
            if (success) {
                showStatus('✓ Expression rendered successfully!', 'success');
            } else {
                showStatus('✗ Failed to render expression. Check the syntax.', 'error');
            }
        }
        
        function downloadImage() {
            if (!renderer || !currentCanvas) {
                showStatus('Please render an expression first', 'error');
                return;
            }
            
            renderer.downloadImage('image.png');
            showStatus('✓ Image downloaded as image.png', 'success');
        }
        
        function viewImage() {
            const url = 'https://babyeinsteinandgminor305fan.github.io/imageditor/image.png';
            window.open(url, '_blank');
            showStatus('✓ Opening image in new tab...', 'info');
        }
        
        function copyToClipboard() {
            const expression = document.getElementById('expressionInput').value;
            navigator.clipboard.writeText(expression).then(() => {
                showStatus('✓ Expression copied to clipboard', 'success');
            }).catch(() => {
                showStatus('✗ Failed to copy', 'error');
            });
        }
        
        function setExample(example) {
            document.getElementById('expressionInput').value = example;
            renderExpression();
        }
        
        function updateRenderer() {
            if (renderer) {
                initRenderer();
            }
        }
        
        function showStatus(message, type) {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = `status-message show ${type}`;
            
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, 4000);
        }
        
        // Initialize on page load
        window.addEventListener('DOMContentLoaded', initRenderer);
    </script>
</body>
</html>
